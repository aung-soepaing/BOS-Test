<div class="container section content">
  <h2>Reset User Password</h2>
  {% if message %}
    <p style="color: {% if success %}green{% else %}red{% endif %};"><strong>{{ message }}</strong></p>
  {% endif %}
  <form method="post">
    <div style="margin-bottom: 12px;">
      <label for="username">Username</label><br>
      <input type="text" id="username" name="username" placeholder="Enter username" required style="width: 100%; max-width: 320px; padding: 8px;">
    </div>
    <div style="margin-bottom: 12px;">
      <label for="new_password">New Password</label><br>
      <input type="password" id="new_password" name="new_password" placeholder="Enter new password (min 8 chars)" required minlength="8" style="width: 100%; max-width: 320px; padding: 8px;">
    </div>
    <button type="submit">Reset Password</button>
  </form>
  <p><a href="{{ url_for('admin_dashboard') }}">Back to Admin Dashboard</a></p>
</div>
